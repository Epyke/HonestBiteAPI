spring.application.name=HonestBiteAPI
spring.main.web-application-type=servlet
server.port=8080

# Config comes from environment variables (set by docker-compose on the server).
# Non-secret defaults are provided for convenience; secrets have NO default and
# are supplied via env vars in prod, or application-local.properties for local dev.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/HonestBite}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

app.jwt.secret=${JWT_SECRET:}

# CORS. Capacitor serves the app from its own origin, not from this host:
# https://localhost on Android, capacitor://localhost on iOS. The remaining
# entries cover `ionic serve` / `ng serve` during local development.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://localhost,capacitor://localhost,http://localhost,http://localhost:8100,http://localhost:4200}

# Multipart image uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

# Cloudinary (secret has NO default; supply via CLOUDINARY_API_SECRET env var)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:cyipbsjl}
cloudinary.api-key=${CLOUDINARY_API_KEY:923878682739452}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
