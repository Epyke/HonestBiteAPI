spring.application.name=HonestBiteAPI
spring.main.web-application-type=servlet
server.port=8080

# Config comes from environment variables (set by docker-compose on the server).
# Non-secret defaults are provided for convenience; secrets have NO default and
# are supplied via env vars in prod, or application-local.properties for local dev.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/HonestBite}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

app.jwt.secret=${JWT_SECRET:}
